# Shadow deployment (dark launch / traffic mirroring)
# ------------------------------------------------------------------
# Production serves user responses from the primary Service. ingress-nginx
# mirrors a copy of each request to the shadow Service; mirror responses are
# discarded—users never see shadow output unless they hit shadow directly.
#
# Prerequisites: ingress-nginx, mirror-target annotation support.
#   minikube addons enable ingress
#   echo "$(minikube ip) shadow.aceest.local" | sudo tee -a /etc/hosts
#
# Apply: kubectl apply -f shadow-deployment.yaml
#
# Observe shadow: kubectl logs -l app=aceest-shadow,track=mirror -n aceest-gym-strategies -f
# Disable mirroring: remove mirror-target annotation from aceest-shadow-primary-ing.
#
# Image tags for Minikube (same image OK for demo):
#   docker tag aceest-gym:latest aceest-gym:primary
#   docker tag aceest-gym:latest aceest-gym:shadow
# ------------------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: aceest-gym-strategies
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow-primary
  namespace: aceest-gym-strategies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-shadow
      track: primary
  template:
    metadata:
      labels:
        app: aceest-shadow
        track: primary
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: web
          image: aceest-gym:primary
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_PATH
              value: /data/aceest.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-shadow-mirror
  namespace: aceest-gym-strategies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-shadow
      track: mirror
  template:
    metadata:
      labels:
        app: aceest-shadow
        track: mirror
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: web
          image: aceest-gym:shadow
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_PATH
              value: /data/aceest.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-shadow-primary-svc
  namespace: aceest-gym-strategies
spec:
  type: NodePort
  selector:
    app: aceest-shadow
    track: primary
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30204
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-shadow-mirror-svc
  namespace: aceest-gym-strategies
spec:
  selector:
    app: aceest-shadow
    track: mirror
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-shadow-primary-ing
  namespace: aceest-gym-strategies
  annotations:
    nginx.ingress.kubernetes.io/mirror-target: http://aceest-shadow-mirror-svc.aceest-gym-strategies.svc.cluster.local:80$request_uri
spec:
  ingressClassName: nginx
  rules:
    - host: shadow.aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-shadow-primary-svc
                port:
                  number: 80
