# A/B testing (header-based routing via ingress-nginx canary)
# ------------------------------------------------------------------
# Default traffic goes to variant A. Requests with header
#   X-Aceest-AB: b
# are routed to variant B (same host/path as main Ingress).
#
# Prerequisites:
#   minikube addons enable ingress
#   echo "$(minikube ip) ab.aceest.local" | sudo tee -a /etc/hosts
#
# Apply: kubectl apply -f ab-testing.yaml
#
# Try B: curl -H "X-Aceest-AB: b" http://ab.aceest.local/
# Try A: curl http://ab.aceest.local/
#
# Rollback B exposure: delete Ingress aceest-ab-b or set canary-by-header to unused name.
#
# Images (demo tags in Minikube Docker):
#   docker tag aceest-gym:latest aceest-gym:variant-a
#   docker tag aceest-gym:latest aceest-gym:variant-b
# ------------------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: aceest-gym-strategies
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-ab-a
  namespace: aceest-gym-strategies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab
      variant: a
  template:
    metadata:
      labels:
        app: aceest-ab
        variant: a
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: web
          image: aceest-gym:variant-a
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_PATH
              value: /data/aceest.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-ab-b
  namespace: aceest-gym-strategies
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-ab
      variant: b
  template:
    metadata:
      labels:
        app: aceest-ab
        variant: b
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: web
          image: aceest-gym:variant-b
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_PATH
              value: /data/aceest.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-a-svc
  namespace: aceest-gym-strategies
spec:
  type: NodePort
  selector:
    app: aceest-ab
    variant: a
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30205
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-ab-b-svc
  namespace: aceest-gym-strategies
spec:
  selector:
    app: aceest-ab
    variant: b
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-ab-main
  namespace: aceest-gym-strategies
spec:
  ingressClassName: nginx
  rules:
    - host: ab.aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-ab-a-svc
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-ab-b
  namespace: aceest-gym-strategies
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-by-header: "X-Aceest-AB"
    nginx.ingress.kubernetes.io/canary-by-header-value: "b"
spec:
  ingressClassName: nginx
  rules:
    - host: ab.aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-ab-b-svc
                port:
                  number: 80
