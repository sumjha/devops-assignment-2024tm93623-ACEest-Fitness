# Canary release (traffic split by weight)
# ------------------------------------------------------------------
# Stable + candidate Deployments. ingress-nginx merges a "canary" Ingress with
# the same host/path as the main Ingress and sends a percentage to the candidate.
#
# Prerequisites:
#   minikube addons enable ingress
#   Use ingress-nginx controller (Minikube default ingress addon class: nginx).
#   echo "$(minikube ip) canary.aceest.local" | sudo tee -a /etc/hosts
#
# Apply: kubectl apply -f canary-release.yaml
#
# Tune traffic: edit canary-weight (0–100) on Ingress aceest-canary-split and re-apply.
# Rollback: set nginx.ingress.kubernetes.io/canary-weight to "0" or delete aceest-canary-split.
#
# Images: tag stable/candidate in Minikube Docker, e.g.
#   docker tag aceest-gym:latest aceest-gym:stable
#   docker tag aceest-gym:latest aceest-gym:candidate
# ------------------------------------------------------------------
---
apiVersion: v1
kind: Namespace
metadata:
  name: aceest-gym-strategies
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary-stable
  namespace: aceest-gym-strategies
  labels:
    track: stable
spec:
  replicas: 2
  selector:
    matchLabels:
      app: aceest-canary
      track: stable
  template:
    metadata:
      labels:
        app: aceest-canary
        track: stable
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: web
          image: aceest-gym:stable
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_PATH
              value: /data/aceest.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: aceest-canary-candidate
  namespace: aceest-gym-strategies
  labels:
    track: candidate
spec:
  replicas: 1
  selector:
    matchLabels:
      app: aceest-canary
      track: candidate
  template:
    metadata:
      labels:
        app: aceest-canary
        track: candidate
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: web
          image: aceest-gym:candidate
          imagePullPolicy: Never
          ports:
            - containerPort: 5000
              name: http
          env:
            - name: DB_PATH
              value: /data/aceest.db
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-stable-svc
  namespace: aceest-gym-strategies
spec:
  type: NodePort
  selector:
    app: aceest-canary
    track: stable
  ports:
    - name: http
      port: 80
      targetPort: http
      nodePort: 30203
---
apiVersion: v1
kind: Service
metadata:
  name: aceest-canary-candidate-svc
  namespace: aceest-gym-strategies
spec:
  selector:
    app: aceest-canary
    track: candidate
  ports:
    - name: http
      port: 80
      targetPort: http
---
# Main (stable) Ingress — must exist first; canary Ingress references same host/path.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-canary-main
  namespace: aceest-gym-strategies
spec:
  ingressClassName: nginx
  rules:
    - host: canary.aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-canary-stable-svc
                port:
                  number: 80
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: aceest-canary-split
  namespace: aceest-gym-strategies
  annotations:
    nginx.ingress.kubernetes.io/canary: "true"
    nginx.ingress.kubernetes.io/canary-weight: "20"
spec:
  ingressClassName: nginx
  rules:
    - host: canary.aceest.local
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: aceest-canary-candidate-svc
                port:
                  number: 80
