name: ACEest CI/CD Pipeline

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build-and-lint:
    name: Build & Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Run flake8 lint check
        run: |
          # fail on syntax errors and undefined names; ignore line-length warnings
          flake8 app.py --count --select=E9,F63,F7,F82 --show-source --statistics

  docker-build:
    name: Docker Image Build
    runs-on: ubuntu-latest
    needs: build-and-lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t aceest-gym:${{ github.sha }} .

      - name: Verify image was created
        run: docker images aceest-gym

  test:
    name: Automated Tests
    runs-on: ubuntu-latest
    needs: docker-build

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image for testing
        run: docker build -t aceest-gym-test:latest .

      - name: Run pytest inside container
        run: |
          docker run --rm \
            -e DB_PATH=":memory:" \
            aceest-gym-test:latest \
            python -m pytest tests/ -v --tb=short
